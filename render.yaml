services:
  - type: web
    name: ai-code-sandbox-orchestrator
    runtime: docker
    dockerfilePath: ./orchestrator/Dockerfile
    dockerContext: ./orchestrator
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SANDBOX_URL
        sync: false
      - key: API_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: MAX_TIMEOUT_MS
        value: "20000"
